name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.2
          cache: 'bundler'
      - name: Install dependencies
        run: bundle install --jobs 4 --retry 3
      - name: Run unit tests
        env:
          AWINRM_INTEGRATION: 0
        run: bundle exec rspec

  integration-tests:
    if: github.event.pull_request == null && env.AWINRM_INTEGRATION == '1'
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.2
      - name: Install dependencies
        run: bundle install --jobs 4 --retry 3
      - name: Run integration tests
        env:
          AWINRM_INTEGRATION: 1
        run: bundle exec rspec spec/integration || true
